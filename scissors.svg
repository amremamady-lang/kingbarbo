<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- white halo for contrast on any background, then dark scissors on top -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#ffffff" stroke-width="4.5">
      <line x1="16" y1="17" x2="7" y2="4"/>
      <line x1="16" y1="17" x2="25" y2="4"/>
      <circle cx="10.5" cy="25" r="3.6"/>
      <circle cx="21.5" cy="25" r="3.6"/>
      <line x1="10.5" y1="25" x2="16" y2="17"/>
      <line x1="21.5" y1="25" x2="16" y2="17"/>
    </g>
    <g stroke="#141414" stroke-width="2">
      <line x1="16" y1="17" x2="7" y2="4"/>
      <line x1="16" y1="17" x2="25" y2="4"/>
      <circle cx="10.5" cy="25" r="3.6"/>
      <circle cx="21.5" cy="25" r="3.6"/>
      <line x1="10.5" y1="25" x2="16" y2="17"/>
      <line x1="21.5" y1="25" x2="16" y2="17"/>
    </g>
    <circle cx="16" cy="17" r="1.5" fill="#141414" stroke="none"/>
  </g>
</svg>
