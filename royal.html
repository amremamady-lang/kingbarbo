  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

\n      confirmBtn:'Bevestig afspraak', back:'← Terug',\n      doneTitle:'Je troon is gereserveerd', doneNote:'Dit is een demo. Je krijgt later een echte bevestiging per sms.',\n      newBooking:'Nieuwe afspraak',\n      sumService:'Dienst', sumWhen:'Wanneer', sumName:'Naam',\n      contactKicker:'Kom langs', contactTitle:'Vind ons in het Zuid',\n      address:'Adres', phone:'Telefoon',\n      footer:'© 2026 King Barbo · Marnixplaats, Antwerpen · 0466 28 62 64'\n    },\n    en: {\n      navServices:'Services', navHours:'Hours', navContact:'Contact', navBook:'Book now',\n      heroKicker:'Men\\u2019s barber · Antwerp South',\n      heroSub:'One dedicated barber who gets your hair and beard sharply in shape. Now in Antwerp South.',\n      heroCta1:'Book a chair', heroCta2:'See hours', heroLoc:'Marnixplaats · 2000 Antwerp',\n      aboutKicker:'The master behind the chair',\n      aboutTitle:'One barber.',\n      aboutP1:'King Barbo is no chain and no assembly line. It\\u2019s one barber who personally handles every cut, from the classic fade to the razor across your beard.',\n      aboutP2:'After years on Vondelstraat, the salon now opens its doors in the heart of Antwerp South.',\n      stat1:'Years experience', stat2:'Dedicated barber', stat3:'Personal', photoSoon:'Photo coming soon',\n      servKicker:'The price list', servTitle:'Services & Prices',\n      hoursKicker:'When to come', hoursTitle:'Opening hours',\n      hoursSub:'Two days are fully by appointment. Three days you can just walk in.',\n      byApptTitle:'By appointment', byApptSub:'Reserve your slot online, no waiting.',\n      walkinTitle:'Walk-in', walkinSub:'No appointment needed, just drop by.',\n      walkinNote:'First come, first served', bookNow:'Book now',\n      closedNote:'Closed Monday & Sunday',\n      resKicker:'Reserve', resTitle:'Book your throne',\n      resSub:'Online booking is available for Tuesday and Wednesday. Pick your service and slot in a few taps.',\n      stepServiceTitle:'1. Choose your service',\n      stepDayTitle:'2. Pick a day', stepDaySub:'Booking is available on Tuesdays and Wednesdays.',\n      stepTimeTitle:'3. Pick a time',\n      stepDetailsTitle:'4. Your details',\n      fieldName:'Name', fieldPhone:'Phone', fieldNote:'Note (optional)',\n      phName:'e.g. Sam Peeters', phPhone:'e.g. 0470 12 34 56', phNote:'Anything we should know?',\n      confirmBtn:'Confirm booking', back:'← Back',\n      doneTitle:'Your throne is reserved', doneNote:'This is a demo. You\\u2019ll get a real confirmation by text later.',\n      newBooking:'New booking',\n      sumService:'Service', sumWhen:'When', sumName:'Name',\n      contactKicker:'Visit us', contactTitle:'Find us in the South',\n      address:'Address', phone:'Phone',\n      footer:'© 2026 King Barbo · Marnixplaats, Antwerp · 0466 28 62 64'\n    }\n  };\n\n  SERVICES = [\n    { id:'cut', icon:'✂', nl:{name:'Heren knippen', desc:'Wassen, knippen, stylen'}, en:{name:'Men\\u2019s cut', desc:'Wash, cut, style'}, price:'€28', dur:{nl:'± 30 min',en:'± 30 min'} },\n    { id:'beard', icon:'🪒', nl:{name:'Baard trimmen', desc:'Bijwerken & scheermes'}, en:{name:'Beard trim', desc:'Shape & razor finish'}, price:'€18', dur:{nl:'± 20 min',en:'± 20 min'} },\n    { id:'combo', icon:'♔', nl:{name:'Knippen + baard', desc:'De volledige King-behandeling'}, en:{name:'Cut + beard', desc:'The full King treatment'}, price:'€42', dur:{nl:'± 50 min',en:'± 50 min'} },\n    { id:'kids', icon:'🧒', nl:{name:'Kinderen (< 12j)', desc:'Knippen voor de prinsjes'}, en:{name:'Kids (< 12y)', desc:'A cut for the little princes'}, price:'€20', dur:{nl:'± 25 min',en:'± 25 min'} },\n    { id:'shave', icon:'💈', nl:{name:'Klassiek scheren', desc:'Hot towel & scheermes'}, en:{name:'Classic shave', desc:'Hot towel & straight razor'}, price:'€25', dur:{nl:'± 30 min',en:'± 30 min'} }\n  ];\n\n  toggle = () => {};\n\n  fmtDay(d, lang) {\n    const wd = lang==='nl'\n      ? ['zo','ma','di','wo','do','vr','za']\n      : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];\n    const mo = lang==='nl'\n      ? ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec']\n      : ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n    return { weekday: wd[d.getDay()], date: d.getDate(), month: mo[d.getMonth()] };\n  }\n\n  getDays() {\n    // next 4 Tuesday/Wednesday occurrences from today\n    const out = [];\n    const d = new Date();\n    d.setHours(0,0,0,0);\n    let i = 0;\n    while (out.length < 4 && i < 30) {\n      const day = new Date(d.getTime() + i*86400000);\n      if (day.getDay() === 2 || day.getDay() === 3) out.push(day);\n      i++;\n    }\n    return out;\n  }\n\n  renderVals() {\n    const lang = this.state.lang;\n    const t = this.T[lang];\n    const step = this.state.step;\n\n    const services = this.SERVICES.map(s => ({ icon:s.icon, name:s[lang].name, desc:s[lang].desc, price:s.price }));\n\n    const apptDays = [ {day: lang==='nl'?'Dinsdag':'Tuesday', hours:'10:00 – 19:00'}, {day: lang==='nl'?'Woensdag':'Wednesday', hours:'10:00 – 19:00'} ];\n    const walkinDays = [\n      {day: lang==='nl'?'Donderdag':'Thursday', hours:'10:00 – 19:00'},\n      {day: lang==='nl'?'Vrijdag':'Friday', hours:'10:00 – 19:00'},\n      {day: lang==='nl'?'Zaterdag':'Saturday', hours:'10:00 – 19:00'}\n    ];\n\n    // stepper\n    const stepLabels = lang==='nl' ? ['Dienst','Dag','Tijd','Gegevens'] : ['Service','Day','Time','Details'];\n    const shownStep = Math.min(step,3);\n    const steps = stepLabels.map((label,i) => ({\n      num: i+1, label,\n      color: i<=shownStep ? '#c9a24b' : '#5a5648',\n      bg: i===shownStep ? 'rgba(201,162,75,0.08)' : 'transparent'\n    }));\n\n    // step 0 bookable cards\n    const bookable = this.SERVICES.map(s => {\n      const sel = this.state.service && this.state.service.id === s.id;\n      return {\n        icon:s.icon, name:s[lang].name, dur:s.dur[lang], price:s.price,\n        border: sel ? '#c9a24b' : 'rgba(244,237,224,0.14)',\n        bg: sel ? 'rgba(201,162,75,0.08)' : 'transparent',\n        select: () => this.setState({ service:s, step:1 })\n      };\n    });\n\n    // step 1 days\n    const days = this.getDays();\n    const availableDays = days.map(d => {\n      const f = this.fmtDay(d, lang);\n      const sel = this.state.day && this.state.day.getTime() === d.getTime();\n      return {\n        weekday:f.weekday, date:f.date, month:f.month,\n        border: sel ? '#c9a24b' : 'rgba(244,237,224,0.14)',\n        bg: sel ? 'rgba(201,162,75,0.08)' : 'transparent',\n        select: () => this.setState({ day:d, step:2 })\n      };\n    });\n\n    // step 2 times\n    const slotTimes = ['10:00','10:45','11:30','12:15','13:00','14:30','15:15','16:00','16:45','17:30','18:15'];\n    const blocked = ['12:15','16:00']; // pretend already booked\n    const timeSlots = slotTimes.map(time => {\n      const dis = blocked.includes(time);\n      const sel = this.state.time === time;\n      return {\n        time, disabled: dis,\n        cursor: dis ? 'not-allowed' : 'pointer',\n        border: sel ? '#c9a24b' : (dis ? 'rgba(244,237,224,0.06)' : 'rgba(244,237,224,0.14)'),\n        bg: sel ? '#c9a24b' : 'transparent',\n        color: sel ? '#0a0a0a' : (dis ? '#444' : '#f4ede0'),\n        select: dis ? (()=>{}) : (() => this.setState({ time, step:3 }))\n      };\n    });\n\n    let selectedDayLabel = '';\n    if (this.state.day) {\n      const f = this.fmtDay(this.state.day, lang);\n      const full = lang==='nl'\n        ? ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag']\n        : ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];\n      selectedDayLabel = full[this.state.day.getDay()] + ' ' + f.date + ' ' + f.month;\n    }\n\n    const svcName = this.state.service ? this.state.service[lang].name : '';\n    const whenStr = selectedDayLabel + (this.state.time ? ' · ' + this.state.time : '');\n    const summaryLine = svcName + ' · ' + whenStr;\n\n    const confirmDisabled = !(this.state.name.trim() && this.state.phone.trim());\n\n    return {\n      t, langLabel: lang==='nl' ? 'EN' : 'NL',\n      toggleLang: () => this.setState({ lang: lang==='nl' ? 'en' : 'nl' }),\n      setNl: () => this.setState({ lang: 'nl' }),\n      setEn: () => this.setState({ lang: 'en' }),\n      nlBg: lang==='nl' ? '#c9a24b' : 'transparent',\n      nlColor: lang==='nl' ? '#0a0a0a' : '#c9a24b',\n      enBg: lang==='en' ? '#c9a24b' : 'transparent',\n      enColor: lang==='en' ? '#0a0a0a' : '#c9a24b',\n      services, apptDays, walkinDays, steps, bookable, availableDays, timeSlots,\n      selectedDayLabel, summaryLine,\n      isOpen: this.state.open,\n      openBooking: () => this.setState({ open: true }),\n      closeBooking: () => this.setState({ open: false }),\n      stop: (e) => e.stopPropagation(),\n      isStep0: step===0, isStep1: step===1, isStep2: step===2, isStep3: step===3, isStep4: step===4,\n      back: () => this.setState(s => ({ step: Math.max(0, s.step-1) })),\n      name:this.state.name, phone:this.state.phone, note:this.state.note,\n      setName: e => this.setState({ name:e.target.value }),\n      setPhone: e => this.setState({ phone:e.target.value }),\n      setNote: e => this.setState({ note:e.target.value }),\n      confirmDisabled,\n      confirmBg: confirmDisabled ? '#5a5648' : '#c9a24b',\n      confirmCursor: confirmDisabled ? 'not-allowed' : 'pointer',\n      confirm: () => { if(!confirmDisabled) this.setState({ step:4 }); },\n      reset: () => this.setState({ step:0, service:null, day:null, time:null, name:'', phone:'', note:'' }),\n      doneMsg: lang==='nl' ? ('Bedankt ' + (this.state.name||'') + '! We zien je graag in het Zuid.') : ('Thanks ' + (this.state.name||'') + '! See you in the South.'),\n      doneService: svcName, doneWhen: whenStr\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
